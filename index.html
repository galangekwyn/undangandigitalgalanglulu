<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galang & Fadlun</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Allura&family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background:#faf8f3;
}

.font-script {
  font-family: 'Allura', cursive;
}

.gradient-text {
  background: linear-gradient(135deg,#c084b8,#a89ec8);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* OPENING SCREEN */
#opening {
  position: fixed;
  inset:0;
  background: linear-gradient(135deg,#fce7f3,#ede9fe);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
  text-align:center;
}

.open-btn {
  margin-top:20px;
  padding:10px 25px;
  border-radius:999px;
  background:linear-gradient(to right,#f9a8d4,#c084fc);
  color:white;
}

/* typing */
.typing::after {
  content:"|";
  animation: blink 1s infinite;
}

@keyframes blink {
  50% {opacity:0;}
}
</style>
</head>

<body>

<!-- 🎁 OPENING -->
<div id="opening">
  <div>
    <p class="text-gray-600 mb-2">Undangan Pernikahan</p>
    <h1 class="font-script text-5xl gradient-text">Galang & Fadlun</h1>
    <button onclick="openInvite()" class="open-btn">Buka Undangan</button>
  </div>
</div>

<!-- 🎵 MUSIC -->
<audio id="music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mpeg">
</audio>

<!-- HERO -->
<section class="min-h-screen flex items-center justify-center text-center px-4">
  <div>
    <p class="uppercase text-sm tracking-widest text-amber-700 mb-6">
      Kami Mengundang Anda
    </p>

    <h1 class="font-script text-5xl md:text-7xl gradient-text mb-4 leading-[1.3]">
      Galang & <br> Fadlun
    </h1>

    <!-- ✅ SPACING FIX -->
    <p class="text-gray-500 text-lg md:text-xl mb-12 font-light">
      Merayakan ikatan cinta kami
    </p>

    <!-- ✍️ TYPING -->
    <h2 id="personal-invite" class="text-xl text-gray-600 typing"></h2>

    <!-- 🎵 BUTTON MUSIC -->
    <button onclick="toggleMusic()" class="mt-6 text-sm text-purple-500">
      🔊 Play / Pause Music
    </button>
  </div>
</section>

<script>
/* =========================
   OPENING ANIMATION
========================= */
function openInvite() {
  document.getElementById('opening').style.display='none';
  document.getElementById('music').play();
}

/* =========================
   TYPING EFFECT
========================= */
const urlParams = new URLSearchParams(window.location.search);
const nama = urlParams.get('nama') || "Tamu Undangan";

const text = "Kepada Yth. " + nama;
let i = 0;

function typing() {
  if(i < text.length){
    document.getElementById("personal-invite").innerHTML += text.charAt(i);
    i++;
    setTimeout(typing, 50);
  }
}

typing();

/* =========================
   MUSIC CONTROL
========================= */
const music = document.getElementById("music");

function toggleMusic(){
  if(music.paused){
    music.play();
  } else {
    music.pause();
  }
}
</script>

</body>
</html>
